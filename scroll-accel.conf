# scroll-accel configuration  —  SOURCE file (installed to /etc by install.sh)
# Edit THIS file, then apply with:   sudo bash ~/workspace/mouse/install.sh
#   (install.sh overwrites /etc with this file, so always edit here, not /etc)
# Calibrate live:  sudo systemctl stop scroll-accel && sudo /usr/local/bin/scroll-accel --debug
#                  (scroll + move the mouse, watch the numbers, Ctrl-C, then start again)
# Inline "# comments" after values are fine — they're stripped before parsing.

# =====================================================================
# WHEEL acceleration (smooth, continuous ramp)
#   multiplier = 1 + accel * (dps - threshold_dps) ^ exponent   (capped at max_mult)
# where dps = wheel speed in detents/sec. Below threshold_dps it's 1.0 (1:1).
# Speed is smoothed asymmetrically: fast attack up, slow release down.
# =====================================================================

threshold_dps = 8       # below this wheel speed, multiplier = 1.0 (slow scroll unchanged)
accel         = 0.1     # how fast the multiplier grows past threshold (~17% below the old 0.12)
exponent      = 1.0     # curve shape on (dps - threshold); 1.0 = linear
max_mult      = 8.0     # cap on the wheel multiplier
attack        = 0.6     # smoothing when speeding up (0..1, higher = snappier)
release       = 0.15    # smoothing when slowing down (0..1, lower = no jitter)
reset_gap_ms  = 180     # a pause longer than this resets to slow (fresh flick = 1.0x)

# =====================================================================
# POINTER acceleration (macOS-like logistic S-curve)
#   gain  = ptr_base_gain + (ptr_max_gain - ptr_base_gain) * sigmoid((v - ptr_mid_speed)/ptr_width)
#   out   = movement * gain        (with sub-count precision carried over)
# where v = smoothed pointer speed in device counts/sec.
#   - slow (v << mid):  gain -> ptr_base_gain (1.0 = precise, 1:1)
#   - fast (v >> mid):  gain -> ptr_max_gain  (smooth cap, like Mac; caps the
#                       RATIO, not your reach — faster flicks still go further)
#
# REQUIRED so curves don't stack: turn OFF libinput's own mouse acceleration:
#   gsettings set org.gnome.desktop.peripherals.mouse accel-profile 'flat'
#   gsettings set org.gnome.desktop.peripherals.mouse speed 0.0
# Revert with:
#   gsettings set org.gnome.desktop.peripherals.mouse accel-profile 'default'
#
# TUNING: run --debug, note your "v" for slow / normal / fast movement.
#   - set ptr_mid_speed to your normal cruising speed,
#   - set ptr_width to roughly half of ptr_mid_speed (smaller = sharper kick-in),
#   - raise ptr_max_gain for more reach on flicks.
# =====================================================================

# DPI-INDEPENDENT (like macOS): the ptr_* curve below is calibrated at 1400 DPI.
# Just set `mouse_dpi` to your actual hardware DPI and the daemon auto-rescales
# the curve so the feel stays identical — no need to touch the ptr_* values.
# (Internally: speed breakpoints *= dpi/1400, gains /= dpi/1400.)
mouse_dpi        = 1400     # << set this to your mouse's hardware DPI

pointer_accel    = 1        # 1 = on, 0 = off (pure passthrough, no pointer accel)
ptr_base_gain    = 0.5      # gain at near-zero speed (precise tracking)
ptr_max_gain     = 2.5      # gain cap at high speed (raise for more reach on flicks)
ptr_mid_speed    = 4000     # speed (counts/sec @1400 DPI) where gain is halfway up the S
ptr_width        = 2000     # transition width (counts/sec @1400 DPI); larger = gentler
ptr_smoothing_ms = 12       # speed smoothing time constant; lower = twitchier/snappier (DPI-independent)

# =====================================================================
# Only accelerate devices whose name contains this (case-insensitive).
# Empty = every mouse with a wheel. Example: name_filter = Keychron
name_filter =
