name: Release

# Tag a release (e.g. `git tag v0.2.0 && git push --tags`) to build a static
# musl binary and attach it to the GitHub Release. Because every dependency is
# pure-Rust (evdev included), the binary is fully static and runs on any distro.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # aarch64-unknown-linux-musl can be added here with a cross-linker.
        target: [x86_64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage artifacts
        run: |
          bin="target/${{ matrix.target }}/release/wayland-mouse"
          cp "$bin" "wayland-mouse"
          tar -czf "wayland-mouse-${{ matrix.target }}.tar.gz" -C "$(dirname "$bin")" wayland-mouse
          sha256sum "wayland-mouse" "wayland-mouse-${{ matrix.target }}.tar.gz" > checksums-${{ matrix.target }}.txt
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wayland-mouse
            wayland-mouse-${{ matrix.target }}.tar.gz
            checksums-${{ matrix.target }}.txt
